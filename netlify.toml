[build]
  command = "npm run build"
  publish = "dist"

# ── Proxy al backend Express en Render ───────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "https://milocapp.onrender.com/api/:splat"
  status = 200
  force = true

# ── Uploads servidos desde el backend ─────────────────────────────────────────
[[redirects]]
  from = "/uploads/*"
  to = "https://milocapp.onrender.com/uploads/:splat"
  status = 200
  force = true

# ── SPA fallback — debe ir al final ──────────────────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
